<!DOCTYPE html>
<html>
<head>
    <title>Lexique</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
        /* Style pour colorer les erreurs en rouge */
        .errorlist {
            color: red;
            list-style-type: none;
            padding-left: 0;
            font-size: 0.9em;
            margin-top: 2px;
        }
        /* Optionnel : encadrer les champs en erreur */
        .error input, .error select, .error textarea {
            border: 1px solid red;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'liste' %}">
            Lexique
        </a>

        <!-- Menus centrés -->
        <div class="collapse navbar-collapse">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'liste' %}">
                        Liste de mots
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'ajouter' %}">
                        Ajouter un mot
                    </a>
                </li>
            </ul>

            <!-- Recherche à droite -->
            <form
                action="{% url 'recherche' %}"
                method="GET"
                class="d-flex"
            >
                <input
                    type="text"
                    name="q"
                    class="form-control me-2"
                    placeholder="Rechercher un mot..."
                >

                <button
                    type="submit"
                    class="btn btn-light"
                >
                    Rechercher
                </button>
            </form>

        </div>

    </div>
</nav>
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
